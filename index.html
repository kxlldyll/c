<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite GTA V Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root { --accent: 34 211 238; }
    .accent { color: rgb(var(--accent)); }
    .accent-bg { background-color: rgb(var(--accent)); }
    .gradient-bg { background: linear-gradient(180deg, #0a0a0a, #1a1a1a); }
  </style>
</head>
<body class="bg-black text-gray-200">

  <!-- Theme Controls -->
  <div class="fixed top-4 right-4 z-50 flex gap-3">
    <select id="accentPicker" onchange="changeAccent(this.value)" class="bg-zinc-900 border border-gray-700 rounded-xl px-4 py-2 text-sm">
      <option value="34,211,238">Cyan</option>
      <option value="168,85,247">Purple</option>
      <option value="34,197,151">Emerald</option>
      <option value="249,115,22">Orange</option>
    </select>
    <button onclick="toggleGradient()" class="bg-zinc-900 border border-gray-700 hover:border-white px-4 py-2 rounded-xl text-sm">Toggle Gradient</button>
  </div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md border-b border-gray-800 z-40">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fas fa-crown text-3xl accent"></i>
        <span class="text-2xl font-bold tracking-tighter">Elite GTA V</span>
      </div>
      <div class="flex gap-8 text-sm">
        <a href="#services" class="hover:text-white">Services</a>
        <a href="#faq" class="hover:text-white">FAQ</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero" class="min-h-screen flex items-center pt-20 gradient-bg">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-7xl font-black gradient-text mb-6">Premium GTA V Services</h1>
      <p class="text-2xl text-gray-400">Recoveries • Modded Outfits • Custom Tools • Instant Delivery</p>
    </div>
  </section>

  <!-- Services -->
  <section id="services" class="py-24 bg-black">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-16">Our Packages</h2>
      <div class="grid md:grid-cols-3 gap-8">
        <!-- Starter -->
        <div class="bg-zinc-950 border border-gray-700 rounded-3xl p-8 hover:border-gray-500 transition">
          <h3 class="text-2xl font-bold">Starter</h3>
          <p class="text-5xl font-bold my-4">$15</p>
          <button onclick="showModal(0)" class="w-full accent-bg text-black py-4 rounded-2xl font-semibold">See Details</button>
        </div>

        <!-- Premium -->
        <div class="bg-zinc-950 border-2 border-white rounded-3xl p-8 relative scale-105">
          <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-white text-black text-xs font-bold px-6 py-1 rounded-full">RECOMMENDED</div>
          <h3 class="text-2xl font-bold">Premium</h3>
          <p class="text-5xl font-bold my-4">$50</p>
          <button onclick="showModal(1)" class="w-full accent-bg text-black py-4 rounded-2xl font-semibold">See Details</button>
        </div>

        <!-- Elite -->
        <div class="bg-zinc-950 border border-gray-700 rounded-3xl p-8 hover:border-gray-500 transition">
          <h3 class="text-2xl font-bold">Elite</h3>
          <p class="text-5xl font-bold my-4">$90</p>
          <button onclick="showModal(2)" class="w-full accent-bg text-black py-4 rounded-2xl font-semibold">See Details</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl max-w-lg w-full mx-4 p-8">
      <div id="modalContent"></div>
      <button onclick="closeModal()" class="mt-8 w-full py-4 border border-gray-600 rounded-2xl">Close</button>
    </div>
  </div>

  <script>
    let currentAccent = "34,211,238";
    let isGradient = true;

    function changeAccent(val) {
      currentAccent = val;
      document.documentElement.style.setProperty('--accent', val);
    }

    function toggleGradient() {
      isGradient = !isGradient;
      const hero = document.getElementById('hero');
      hero.className = isGradient ? 
        "min-h-screen flex items-center pt-20 gradient-bg" : 
        "min-h-screen flex items-center pt-20 bg-black";
    }

    const packages = [
      { title: "Starter", price: "$15", desc: "Basic recoveries, simple outfits, entry-level tools." },
      { title: "Premium", price: "$50", desc: "Full recoveries, money drops, advanced outfits, vehicle spawner pack, rank boosts." },
      { title: "Elite", price: "$90", desc: "Everything in Premium + exclusive mods, max rank & stats, full custom requests." }
    ];

    function showModal(i) {
      const pkg = packages[i];
      document.getElementById('modalContent').innerHTML = `
        <h2 class="text-3xl font-bold mb-2">${pkg.title}</h2>
        <p class="text-5xl font-bold mb-6 accent">${pkg.price}</p>
        <p class="text-gray-400 leading-relaxed">${pkg.desc}</p>
        <div class="mt-8 text-sm text-gray-400">
          <p class="font-semibold mb-2">What's Included:</p>
          <ul class="list-disc pl-5 space-y-1">
            <li>Instant delivery</li>
            <li>Modded outfits & unlocks</li>
            <li>Vehicle spawning tools</li>
            <li>Priority support via Discord</li>
          </ul>
        </div>
      `;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }
  </script>
</body>
</html>
