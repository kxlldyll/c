<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA V Modding Services</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: #000;
      color: white;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .crown {
      font-size: 85px;
      background: linear-gradient(90deg, #f1f5f9, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(241, 245, 249, 0.6));
      margin-bottom: 30px;
    }

    h1 {
      font-size: 3.6rem;
      font-weight: 900;
      letter-spacing: -3px;
      background: linear-gradient(90deg, #f8fafc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.3rem;
      color: #aaa;
      max-width: 560px;
      margin: 0 auto 50px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 16px 38px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 9999px;
      transition: 0.3s;
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-primary:hover { transform: scale(1.05); }

    .btn-secondary {
      border: 2px solid #555;
      color: white;
    }

    .btn-secondary:hover {
      border-color: white;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div>
    <i class="fa-solid fa-crown crown"></i>
    <h1>GTA V Modding Services</h1>
    <p>Premium recoveries, modded outfits, custom tools — delivered safely and instantly on Steam.</p>
    
    <div class="buttons">
      <button class="btn-primary">Explore Services</button>
      <button class="btn-secondary">View Products</button>
    </div>
  </div>
</body>
</html>
