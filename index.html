<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite GTA V Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('https://picsum.photos/id/1015/2000/1200');
      background-size: cover;
      background-position: center;
    }
    .neon-text { text-shadow: 0 0 20px rgb(34 211 238), 0 0 40px rgb(34 211 238); }
    .card-hover:hover { transform: translateY(-12px) scale(1.02); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-zinc-950/90 backdrop-blur-lg border-b border-zinc-800 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fas fa-crown text-3xl text-cyan-400"></i>
        <span class="text-2xl font-bold tracking-tighter">Elite GTA V</span>
      </div>
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="#features" class="hover:text-cyan-400 transition">Features</a>
        <a href="#services" class="hover:text-cyan-400 transition">Services</a>
        <a href="#faq" class="hover:text-cyan-400 transition">FAQ</a>
      </div>
      <a href="#services" class="bg-cyan-500 hover:bg-cyan-400 px-8 py-3 rounded-2xl text-black font-semibold transition">Get Access</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-bg min-h-screen flex items-center pt-20">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-7xl font-black tracking-tighter neon-text mb-6">
        Premium GTA V Services
      </h1>
      <p class="text-xl md:text-2xl text-zinc-300 max-w-2xl mx-auto mb-10">
        Recoveries • Modded Outfits • Custom Tools • Instant Delivery
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
        <a href="#services" class="bg-white text-black px-10 py-4 rounded-2xl text-lg font-semibold hover:scale-105 transition shadow-xl">Get Started Now</a>
        <a href="#features" class="border-2 border-white/70 hover:border-white px-10 py-4 rounded-2xl text-lg font-semibold transition">Explore Features</a>
      </div>
      <p class="text-sm text-zinc-400">Trusted by hundreds • Undetected • Secure Payments</p>
    </div>
  </section>

  <!-- Rest of the sections (Features, Services, FAQ) stay mostly the same but with better spacing -->

</body>
</html>
