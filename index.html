<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA V Modding Services</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: #000000;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .crown {
      font-size: 100px;
      background: linear-gradient(90deg, #f1f5f9, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(241, 245, 249, 0.5));
      margin-bottom: 40px;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 900;
      letter-spacing: -3px;
      background: linear-gradient(90deg, #f8fafc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      line-height: 1.05;
    }

    p {
      font-size: 1.35rem;
      color: #d1d5db;
      max-width: 580px;
      margin: 0 auto 50px;
      line-height: 1.45;
    }

    .steam-note {
      background: rgba(255,255,255,0.015);
      padding: 28px 40px;
      border-radius: 20px;
      margin: 40px auto;
      max-width: 520px;
      text-align: center;
      color: #fff;
    }

    .steam-note i {
      font-size: 42px;
      color: #fff;
      margin-bottom: 12px;
      display: block;
    }

    .steam-note strong {
      font-size: 1.25rem;
      display: block;
      margin-bottom: 12px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 9999px;
      transition: all 0.3s ease;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
    }

    button:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div>
    <i class="fa-solid fa-crown crown"></i>
    
    <h1>GTA V Modding Services</h1>
    
    <p>Premium recoveries, modded outfits, custom tools — delivered safely and instantly.</p>

    <!-- Steam Disclaimer -->
    <div class="steam-note">
      <i class="fab fa-steam-symbol"></i>
      <strong>Steam Only.</strong>
      You privately send your login details. We log in, perform the service you ordered, and log out. 
      Nothing is installed on your PC.
    </div>

    <div class="buttons">
      <button>Explore Services</button>
      <button>View Products</button>
    </div>
  </div>
</body>
</html>
