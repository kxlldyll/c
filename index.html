<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite GTA Services</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ELITE GTA</div>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#services">Services</a>
            <a href="#faq">FAQ</a>
            <a href="#tos">ToS</a>
        </div>
        <a href="#services" class="cta-btn">Get Access</a>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Dominate GTA Online</h1>
            <p>Recoveries • Modded Outfits • Free Businesses • Undetected</p>
            <a href="#services" class="main-btn">Choose Your Package</a>
        </div>
    </section>

    <section id="services" class="services">
        <h2>Pricing</h2>
        <div class="pricing-grid">
            <div class="price-card">
                <h3>Starter</h3>
                <p class="price">$15</p>
                <button class="btn" onclick="showModal('Starter - $15')">Buy Now</button>
            </div>
            <div class="price-card popular">
                <h3>Premium</h3>
                <p class="price">$50</p>
                <button class="btn" onclick="showModal('Premium - $50')">Buy Now</button>
            </div>
            <div class="price-card">
                <h3>Elite</h3>
                <p class="price">$90</p>
                <button class="btn" onclick="showModal('Elite - $90')">Buy Now</button>
            </div>
        </div>
    </section>

    <!-- FAQ, ToS, Modal same as before -->

    <script src="app.js"></script>
</body>
</html>
