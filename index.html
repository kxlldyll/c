<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA V Modding Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .gradient-text {
      background: linear-gradient(90deg, #f1f5f9, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .crown-glow {
      filter: drop-shadow(0 0 30px rgba(241, 245, 249, 0.6));
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center">

  <div class="max-w-4xl mx-auto px-6 text-center">
    <!-- Crown -->
    <div class="flex justify-center mb-10">
      <i class="fa-solid fa-crown text-[120px] text-white crown-glow"></i>
    </div>

    <!-- Title -->
    <h1 class="text-7xl md:text-8xl font-black tracking-[-2px] gradient-text leading-none mb-8">
      GTA V Modding Services
    </h1>

    <!-- Subtitle -->
    <p class="text-2xl text-gray-300 max-w-2xl mx-auto mb-12">
      Premium recoveries, modded outfits, custom tools —<br>
      delivered safely and instantly.
    </p>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <button class="bg-white text-black px-10 py-5 rounded-3xl text-lg font-semibold hover:scale-105 transition">
        Explore Services
      </button>
      <button class="border border-white/40 hover:border-white px-10 py-5 rounded-3xl text-lg font-semibold transition">
        View Products
      </button>
    </div>
  </div>

</body>
</html>
