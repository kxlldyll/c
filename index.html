<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS • Underground Modding OS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="logo">NEXUS</div>
    <nav class="nav">
      <button data-filter="all" class="filter-btn active">All</button>
      <button data-filter="outfits" class="filter-btn">Outfits</button>
      <button data-filter="vehicles" class="filter-btn">Vehicles</button>
      <button data-filter="economy" class="filter-btn">Economy</button>
    </nav>
    <div class="header-right">
      <button id="theme-btn" class="icon-btn">🎨</button>
      <button id="cart-btn" class="cart-btn">
        Cart <span id="cart-count" class="badge">0</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="hero">
      <h1>Underground Modding OS</h1>
      <p class="subtitle">Enterprise-grade cheating since 2018. Your account is now our sandbox.</p>
    </div>

    <div class="products-grid" id="products-grid"></div>
  </main>

  <!-- Cart Drawer -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button id="close-cart">✕</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-total">
      <span>Total</span>
      <strong id="cart-total">$0.00</strong>
    </div>
    <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
  </div>

  <!-- Checkout Modal -->
  <div class="modal" id="checkout-modal">
    <div class="modal-content">
      <h2>Secure Checkout</h2>
      <p>We accept LTC, Robux, and your dignity.</p>
      <button id="place-order" class="place-order-btn">Place Order (It's a prank)</button>
      <button id="close-modal" class="cancel-btn">Nevermind</button>
    </div>
  </div>

  <!-- Theme Customizer -->
  <div class="theme-panel" id="theme-panel">
    <h3>Appearance Settings</h3>
    <button onclick="setTheme('#00f0ff')">Cyber Blue</button>
    <button onclick="setTheme('#ff00aa')">Vice Pink</button>
    <button onclick="setTheme('#00ff88')">Toxic Green</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
