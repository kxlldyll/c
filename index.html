<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nothing to see here</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .quote {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-style: italic;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
      max-width: 32ch;
      margin-bottom: 3rem;
      line-height: 1.5;
      user-select: none;
    }

    .click-zone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .click-label {
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ff2222;
      text-shadow: 0 0 20px rgba(255, 34, 34, 0.6);
      animation: labelPulse 1s ease-in-out infinite;
      user-select: none;
    }

    @keyframes labelPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    .arrow-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: -1rem;
    }

    .arrow {
      font-size: clamp(4rem, 15vw, 9rem);
      color: #ff2222;
      animation: arrowBounce 0.6s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255, 34, 34, 0.8));
      line-height: 1;
      user-select: none;
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(18px); }
    }

    #the-circle {
      width: clamp(180px, 40vw, 320px);
      height: clamp(180px, 40vw, 320px);
      border-radius: 50%;
      border: 6px solid #ff2222;
      background: radial-gradient(circle at 35% 35%, #2a0000, #000);
      cursor: pointer;
      box-shadow:
        0 0 40px rgba(255, 34, 34, 0.4),
        inset 0 0 60px rgba(255, 34, 34, 0.15);
      animation: circlePulse 1.5s ease-in-out infinite;
      transition: transform 0.1s;
      outline: none;
    }

    #the-circle:hover {
      transform: scale(1.06);
      box-shadow:
        0 0 80px rgba(255, 34, 34, 0.7),
        inset 0 0 60px rgba(255, 34, 34, 0.25);
    }

    #the-circle:active {
      transform: scale(0.97);
    }

    @keyframes circlePulse {
      0%, 100% { box-shadow: 0 0 40px rgba(255, 34, 34, 0.4), inset 0 0 60px rgba(255, 34, 34, 0.15); }
      50% { box-shadow: 0 0 90px rgba(255, 34, 34, 0.8), inset 0 0 80px rgba(255, 34, 34, 0.3); }
    }

    #flashbang {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #fff;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
    }

    #flashbang.active {
      visibility: visible;
      animation: flashbang 5s ease-out forwards;
    }

    @keyframes flashbang {
      0%   { opacity: 0; }
      1%   { opacity: 1; }
      10%  { opacity: 1; }
      30%  { opacity: 0.95; }
      55%  { opacity: 0.75; }
      80%  { opacity: 0.4; }
      100% { opacity: 0; }
    }

    body.blasted {
      animation: shake 0.4s ease-out;
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-8px, 6px); }
      40% { transform: translate(7px, -7px); }
      60% { transform: translate(-6px, -4px); }
      80% { transform: translate(5px, 5px); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <p class="quote">"Curiosity is the wick in the candle of learning — and also how you set your retinas on fire."</p>

  <div class="click-zone" id="click-zone">
    <p class="click-label">CLICK THIS</p>
    <div class="arrow-wrap">
      <span class="arrow" aria-hidden="true">▼</span>
    </div>
    <button id="the-circle" type="button" aria-label="Click this circle"></button>
  </div>

  <div id="flashbang" aria-hidden="true"></div>

  <script>
    const circle = document.getElementById("the-circle");
    const flash = document.getElementById("flashbang");
    const clickZone = document.getElementById("click-zone");
    let done = false;

    function playFlashSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        const noise = ctx.createBufferSource();
        const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 0.3);
        }
        noise.buffer = buffer;

        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(1, ctx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

        const osc = ctx.createOscillator();
        osc.type = "square";
        osc.frequency.setValueAtTime(2000, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);

        const oscGain = ctx.createGain();
        oscGain.gain.setValueAtTime(0.6, ctx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);

        noise.connect(noiseGain);
        osc.connect(oscGain);
        noiseGain.connect(ctx.destination);
        oscGain.connect(ctx.destination);

        noise.start();
        osc.start();
        noise.stop(ctx.currentTime + 0.2);
        osc.stop(ctx.currentTime + 0.12);
      } catch (_) {}
    }

    function flashbang() {
      if (done) return;
      done = true;

      playFlashSound();

      document.body.classList.add("blasted");
      setTimeout(() => document.body.classList.remove("blasted"), 400);

      clickZone.classList.add("hidden");

      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");
    }

    circle.addEventListener("click", flashbang);
  </script>
</body>
</html>
